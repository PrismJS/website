name: Rebuild Plugins Website

on:
  push:
    branches:
      - main
    paths:
      # 11ty-related folders
      - "_build/**"
      - "_layouts/**"
      - "_includes/**"
      - "_data/**"

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build Hook
        run: curl -X POST -d "{}" "https://api.netlify.com/build_hooks/67ee875239eb61a718f12594?trigger_title=The+main+repo+has+been+updated&clear_cache=true"
